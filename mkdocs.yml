site_name: AWS Certified Solutions Architect Associate (SAA-C03)
site_description: Complete study guide for the AWS Certified Solutions Architect Associate exam (SAA-C03)
site_author: AWS Study Guide

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  icon:
    logo: material/cloud-outline
    repo: fontawesome/brands/github

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Foundations:
      - Getting Started with AWS: getting-started.md
      - IAM – Identity & Access Management: iam.md
  - Compute:
      - EC2 Basics: ec2-basics.md
      - EC2 Associate: ec2-associate.md
      - EC2 Instance Storage: ec2-storage.md
      - High Availability & Scalability: high-availability.md
  - Databases:
      - RDS, Aurora & ElastiCache: rds-aurora-elasticache.md
      - Databases in AWS: databases.md
  - Networking:
      - Amazon Route 53: route53.md
      - CloudFront & Global Accelerator: cloudfront.md
      - Amazon VPC: vpc.md
  - Storage:
      - Amazon S3: s3.md
      - Amazon S3 Advanced: s3-advanced.md
      - Amazon S3 Security: s3-security.md
      - Storage Extras: storage-extras.md
  - Application Integration:
      - Integration & Messaging: messaging.md
      - Containers on AWS: containers.md
      - Serverless Overview: serverless.md
      - Serverless Architectures: serverless-architectures.md
  - Analytics & ML:
      - Data & Analytics: analytics.md
      - Machine Learning: machine-learning.md
  - Security & Operations:
      - Monitoring, Audit & Performance: monitoring.md
      - Advanced Identity in AWS: advanced-identity.md
      - Security & Encryption: security-encryption.md
  - Architecture:
      - Classic Solutions Architecture: classic-architecture.md
      - Disaster Recovery & Migrations: disaster-recovery.md
      - More Solutions Architecture: solutions-architecture.md